name: Sync note columns

on:
  workflow_dispatch:
  schedule:
    # 05:15 JST every day
    - cron: "15 20 * * *"

permissions:
  contents: write

jobs:
  sync-note-columns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync note RSS to column pages
        run: python3 scripts/sync_note_columns.py

      - name: Commit generated column updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/note-posts.json column sitemap.xml
          if git diff --cached --quiet; then
            echo "No note column updates."
          else
            git commit -m "Sync note columns"
            git push
          fi
